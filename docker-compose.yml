version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opticredit-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://prestamos_user:prestamos_pass@postgres:5432/prestamos_db
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - opticredit-net

  nginx:
    image: nginx:1.27-alpine
    container_name: opticredit-nginx
    ports:
      - "8000:80"
    volumes:
      - ./nginx-opti.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - opticredit-net

  postgres:
    image: postgres:16-alpine
    container_name: opticredit-postgres
    environment:
      POSTGRES_USER: prestamos_user
      POSTGRES_PASSWORD: prestamos_pass
      POSTGRES_DB: prestamos_db
    volumes:
      - opticredit_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prestamos_user -d prestamos_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - opticredit-net

volumes:
  opticredit_db_data:

networks:
  opticredit-net:
    driver: bridge