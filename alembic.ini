# Alembic Configuration File

[alembic]
# path to migration scripts
script_location = app/db/migrations

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be named with an ordering scheme
# file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to datetime.datetime.now(datetime.timezone(datetime.timedelta(0)))
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field of a migration file
# when using the 2.0 - version (SQLALCHEMY_20)

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# version location specification; This defaults
# to app/db/migrations/versions.  When using multiple version
# directories, initial revisions must be specified with --version-path.
# The path separator used here should be the separator specified by "version_path_separator" below.
# version_locations = %(here)s/bar:%(here)s/bat:app/db/migrations/versions

# version path separator; By default this uses the directory separator and is used
# to split version_locations into its component parts. This
# feature is used when it's necessary to report individually the
# version identifiers being applied as they are effected by
# the operation of path separators
# version_path_separator = :

# the output encoding used when revision files
# output the "Rev:" and "Revises:" headers
# this is ignored if exc_info above is not None
# output_encoding = utf-8

sqlalchemy.url = driver://user:password@localhost/dbname


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
